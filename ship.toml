# ship.toml — Release readiness manifest for gitguard
#
# This file defines which readiness checks must pass before shipping.
# Uncomment checks to enable, comment to skip.
# Any check marked as a comment requires explicit opt-in for your tier.
#
# Tier: team
#
# [project]
# tier = "team"          # internal | team | open-source | product
# type = "library"    # optional project type for documentation

[project]
tier = "team"

# [checks]
# Override individual tier defaults here.
# All fields default to tier settings unless explicitly set.
#
# Basic Quality (enabled for all non-internal tiers)

# Team projects: Production-ready, shared ownership
# tests ✓ | lint ✓ | fmt ✓ | codemap ✓ | security_scan ✓ | changelog ✓
# readme_quality ✓ | version_bump ✓ | env_documented ✓
tests = true
lint = true
fmt = true                # cargo fmt / prettier --write / ruff format etc., absorbed into commit
codemap = true
security_scan = true
changelog = true
readme_quality = true
version_bump = true
env_documented = true
# docs_freshness = false  (uncomment to enable)
# license = false
# contributing = false
# known_issues = false
# three_doc_standard = false
# smoke_test = false
# ci_pipeline = false"

# Deploy + PR settings (all optional)
# Uncomment and customize for your project.
#
# [deploy]
# pr_base_branch = "development"      # default base branch for `gh pr create`
#                                     # gitflow-style: feature -> development -> main
#                                     # falls back to repo default branch when unset
# smoke_test_cmd = "npm run health-check"
# smoke_test_cmd = "cargo run -- --health-check"
# production_branch = "main"          # reserved for future release-pipeline use (not yet wired)

# Workflow + review gates (all optional, #143)
# Uncomment and tune to enforce review discipline cross-repo.
#
# [workflow]
# integration_branch = "development"        # feature PRs target this; falls back to GH default
# production_branch  = "main"               # release PRs target this (gitguard release)
# long_lived         = ["main", "development"]
# auto_sync_after_merge = true              # finish/release fast-forward long_lived
# max_worktrees      = 8                    # gitguard start --worktree budget (#142)
# require_human_review    = false           # gitguard merge-pr demands APPROVED review (#143)
# require_security_review = false           # ship injects Security Review checklist
# require_senior_review   = false           # ship injects Senior-Developer Review checklist
# review_checklist        = "default"       # "default" or path to .gitguard/checklist.md

# Codemap security overrides (optional, #153)
# Document HIGH/CRITICAL findings that are intentional. Each entry requires
# `path`, `cwe`, `reason`. gitguard ship's codemap gate demotes documented
# findings to INFO; net-new findings still block.
#
# [[checks.security_overrides]]
# path = "src/executor/eval.ts"
# cwe = "CWE-95"
# reason = "Sandboxed executor — user-authored code, audited 2026-05"

# Lifecycle hooks (optional, #159)
# Auto-cascade steps after each gitguard command. Variables in `args`:
# $GG_BRANCH (current branch), $GG_REPO (repo path), $GG_PR (last opened PR).
# Recursion-guarded via GG_IN_HOOK env var. Stop on first failure.
# Available commands: ship, finish, merge-pr, save, start.
#
# [[hooks.ship.post]]
# steps = [
#   { run = "sync-branches" },
#   { run = "verify", args = ["$GG_BRANCH"] },
# ]
#
# [[hooks.finish.post]]
# steps = [
#   { run = "gc", args = ["--orphans"] },
# ]
#
# [[hooks.merge-pr.post]]
# steps = [
#   { human = "PR merged. Run any deployment tasks now, then press Enter." },
# ]

# Documentation standards
# [docs]
# stale_threshold_days = 30
# critical_docs = ["ARCHITECTURE.md", "DEPLOYMENT.md", "API.md"]
